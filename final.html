<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Confirmed 💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(to bottom, #ffe4ec, #fff);
      text-align: center;
      padding: 30px;
      margin: 0;
      overflow: hidden;
    }

    /* Minecraft-style pixel hearts background */
    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(#ffb3c6 2px, transparent 2px),
        radial-gradient(#ffc2d1 2px, transparent 2px);
      background-size: 40px 40px;
      opacity: 0.3;
      z-index: -1;
    }

    h1 {
      color: #ff4d88;
      font-size: 2.5em;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    p {
      color: #444;
      font-size: 18px;
    }

    .animals {
      margin-top: 20px;
    }

    .animals img {
      width: 120px;
      margin: 10px;
      border-radius: 15px;
    }
  </style>
</head>

<body>

  <div class="bg"></div>

  <h1>💖 Order Confirmed 💖</h1>

  <div class="card">
    <p>
      Yay!! Your order has been placed 🥺💕<br><br>
      Thank you for being the cutest boyfriend ever<br>
      I love spending time with you, and I just wanna make it special for you<br>
      and besides you got a personal little chef waiting for you on Thrusday :3 💖
    </p>

    <div class="animals">
      <img src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif" alt="cat">
      <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" alt="dog">
    </div>

    <p>🐾 sending you hugs & love 🐾</p>
  </div>

</body>
</html>
