<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💖</text></svg>">
  <meta charset="UTF-8">
  <title>4 Month Café 💖</title>

  <!-- Cute Font -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(to bottom, #ffe4ec, #fff);
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .header {
      padding: 30px;
    }

    h1 {
      color: #ff4d88;
      font-size: 2.5em;
    }

    p {
      color: #555;
    }

    .images {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
    }

    .images img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 15px;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 20px;
      max-width: 450px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    input, button {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    button {
      background-color: #ff4d88;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #e63970;
    }

    .hidden {
      display: none;
      margin-top: 20px;
      font-size: 18px;
      color: #28a745;
    }

    a button {
      background-color: #ff85a2;
    }

    a button:hover {
      background-color: #ff5c8a;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>💖 4 Month Café 💖</h1>
    <p>A special morning date just for you ☀️</p>
  </div>

  <!-- Cute breakfast images -->
  <div class="images">
    <img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d" alt="pancakes">
    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836" alt="breakfast">
    <img src="https://images.unsplash.com/photo-1499028344343-cd173ffc68a9" alt="toast">
  </div>

  <div class="container">
    <h2>Make a Reservation ✨</h2>

    <input type="text" id="name" placeholder="Your Name 💕">
    <input type="date" id="date">
    <input type="time" id="time">

    <button onclick="reserve()">Reserve Table</button>

    <!-- Confirmation -->
    <div id="confirmation" class="hidden"></div>

    <!-- Button to next page -->
    <a href="menu.html" id="nextPage" class="hidden">
      <button>View Your Special Menu 💕</button>
    </a>
  </div>

  <script>
    function reserve() {
      const name = document.getElementById("name").value;
      const time = document.getElementById("time").value;
      const date = document.getElementById("date").value;

      if (name === "" || time === "" || date === "") {
        alert("Fill everything please cutie 😭💖");
        return;
      }

      const message = `
      💌 Reservation Confirmed 💌<br><br>
      Table for: ${name} 💕<br>
      Date: ${date} <br>
      Time: ${time} <br><br>
      Your table is ready... with love 💖
      `;

      const confirmation = document.getElementById("confirmation");
      confirmation.innerHTML = message;
      confirmation.classList.remove("hidden");

      document.getElementById("nextPage").classList.remove("hidden");
    }
  </script>

</body>
</html>
